<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Digital Ration Card System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    input:focus { outline: none; }
    .error-box { display: none; }
    .error-box.show { display: block; }
  </style>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-6">

  <div class="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row border border-slate-200">

    <!-- ── Left Branding Panel ── -->
    <div class="md:w-1/2 bg-blue-600 p-12 text-white flex flex-col justify-center">
      <i data-lucide="shield-check" class="w-16 h-16 mb-6"></i>
      <h2 class="text-4xl font-bold mb-4 leading-tight">Securing Food,<br/>Empowering Citizens.</h2>
      <p class="text-blue-100 text-base">Official Government Portal for Ration Allocation and Family Management.</p>
      <div class="mt-8 flex gap-4">
        <div class="bg-blue-500/30 p-4 rounded-2xl flex-1 text-center">
          <p class="text-2xl font-bold">1.2M+</p>
          <p class="text-xs text-blue-200 uppercase tracking-widest font-bold mt-1">Cards Issued</p>
        </div>
        <div class="bg-blue-500/30 p-4 rounded-2xl flex-1 text-center">
          <p class="text-2xl font-bold">100%</p>
          <p class="text-xs text-blue-200 uppercase tracking-widest font-bold mt-1">Digital Trace</p>
        </div>
      </div>
    </div>

    <!-- ── Right Login Form ── -->
    <div class="md:w-1/2 p-12 bg-white">
      <div class="mb-8">
        <h3 class="text-2xl font-bold text-slate-800 mb-1">Welcome Back</h3>
        <p class="text-slate-500 text-sm">Log in to manage your digital card profile</p>
      </div>

      <!-- Error Message -->
      <div id="login-error" class="error-box mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-xl text-sm font-medium"></div>

      <!-- Login Form — action points to LoginServlet -->
      <form id="login-form" action="LoginServlet" method="POST" class="space-y-5" novalidate>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Aadhaar / Username</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-3 flex items-center text-slate-400">
              <i data-lucide="user" class="w-5 h-5"></i>
            </span>
            <input id="username" name="username" type="text"
              placeholder="Enter 12-digit Aadhaar or Username"
              class="w-full pl-11 pr-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-blue-500 transition-all text-sm"/>
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-3 flex items-center text-slate-400">
              <i data-lucide="lock" class="w-5 h-5"></i>
            </span>
            <input id="password" name="password" type="password"
              placeholder="••••••••"
              class="w-full pl-11 pr-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-blue-500 transition-all text-sm"/>
          </div>
        </div>

        <!-- Hidden role field — set by which button is clicked -->
        <input type="hidden" name="role" id="role-input" value="citizen"/>

        <div class="flex gap-3 pt-2">
          <button type="submit" onclick="setRole('citizen')"
            class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 flex items-center justify-center gap-2 text-sm">
            <i data-lucide="user-circle" class="w-4 h-4"></i> Citizen Login
          </button>
          <button type="submit" onclick="setRole('admin')"
            class="flex-1 bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-900 transition-all shadow-lg shadow-slate-200 flex items-center justify-center gap-2 text-sm">
            <i data-lucide="shield" class="w-4 h-4"></i> Admin Portal
          </button>
        </div>
      </form>

      <div class="mt-8 pt-6 border-t border-slate-100 text-center space-y-2">
        <p class="text-sm text-slate-500">New citizen? <a href="register.html" class="text-blue-600 font-bold hover:underline">Apply for Ration Card</a></p>
        <p class="text-xs text-slate-400"><a href="track-status.html" class="hover:underline hover:text-blue-500 transition-colors">Track Application Status</a></p>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    function setRole(role) {
      document.getElementById('role-input').value = role;
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const err = document.getElementById('login-error');

      err.classList.remove('show');

      if (!username) {
        e.preventDefault();
        err.textContent = 'Please enter your Aadhaar number or username.';
        err.classList.add('show');
        return;
      }
      if (!password) {
        e.preventDefault();
        err.textContent = 'Please enter your password.';
        err.classList.add('show');
        return;
      }
      if (/^\d+$/.test(username) && username.length !== 12) {
        e.preventDefault();
        err.textContent = 'Aadhaar number must be exactly 12 digits.';
        err.classList.add('show');
      }
    });
  </script>
</body>
</html>
